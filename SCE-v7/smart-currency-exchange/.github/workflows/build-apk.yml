name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Fix ViewModel
        run: |
          VM="SCE-v7/smart-currency-exchange/app/src/main/java/com/example/ui/viewmodel/CurrencyViewModel.kt"
          python3 - "$VM" << 'PYEOF'
          import sys
          f = sys.argv[1]
          with open(f, 'r') as fp:
              content = fp.read()
          opens = content.count('{')
          closes = content.count('}')
          diff = opens - closes
          print(f"Open={opens} Close={closes} Diff={diff}")
          if diff < 0:
              lines = content.splitlines()
              removed = 0
              for i in range(len(lines)-1, -1, -1):
                  if lines[i].strip() == '}' and removed < abs(diff):
                      print(f"Removing line {i+1}: {repr(lines[i])}")
                      lines.pop(i)
                      removed += 1
              content = '\n'.join(lines) + '\n'
              with open(f, 'w') as fp:
                  fp.write(content)
              print(f"Removed {removed} extra braces")
          elif diff > 0:
              with open(f, 'a') as fp:
                  for _ in range(diff):
                      fp.write('\n}')
              print(f"Added {diff} closing braces")
          else:
              print("Braces balanced - no fix needed")
          PYEOF

      - name: Build Debug APK
        run: |
          cd SCE-v7/smart-currency-exchange
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartCurrencyExchange-APK
          path: SCE-v7/smart-currency-exchange/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
