name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Fix ViewModel
        run: |
          VM="SCE-v7/smart-currency-exchange/app/src/main/java/com/example/ui/viewmodel/CurrencyViewModel.kt"
          LINES=$(wc -l < "$VM")
          echo "Lines: $LINES"
          echo "Last 3 lines:"
          tail -3 "$VM"
          head -n 1639 "$VM" > /tmp/vm.kt
          echo "}" >> /tmp/vm.kt
          mv /tmp/vm.kt "$VM"
          echo "Fixed. Last 3 lines now:"
          tail -3 "$VM"

      - name: Build Debug APK
        run: |
          cd SCE-v7/smart-currency-exchange
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartCurrencyExchange-APK
          path: SCE-v7/smart-currency-exchange/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30